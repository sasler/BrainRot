<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Breakout</title>
  <style>
    body { background: #050510; color: #e4e4ef; margin: 0; overflow: hidden; font-family: 'Courier New', monospace; }
    canvas { display: block; image-rendering: pixelated; margin: 0 auto; background: #111; }
    #ui { position: fixed; top: 10px; left: 10px; right: 10px; display: flex; justify-content: space-between; z-index: 10; pointer-events: none; }
    .screen { position: fixed; inset: 0; background: rgba(5,5,16,0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 20; }
    button { background: transparent; border: 1px solid #0ff; color: #0ff; padding: 10px 20px; cursor: pointer; }
    button:hover { background: #0ff3; }
  </style>
</head>
<body>
  <div id="ui"><span>SCORE: <span id="s">0</span></span><span id="st">READY</span></div>
  <div id="start" class="screen"><h1>BREAKOUT</h1><button onclick="st()">START</button></div>
  <div id="over" class="screen" style="display:none;"><h1>GAME OVER</h1><p>Final: <span id="fs">0</span></p><button onclick="st()">RETRY</button></div>
  <canvas id="c"></canvas>
  <script>
    const cvs = document.getElementById('c'), ctx = cvs.getContext('2d');
    let W, H, run = false, sc = 0, pad, ball, bricks=[];
    function rs() { W = cvs.width = window.innerWidth; H = cvs.height = window.innerHeight; }
    window.addEventListener('resize', rs); rs();
    function st() {
      document.getElementById('start').style.display = 'none';
      document.getElementById('over').style.display = 'none';
      run = true; sc = 0; pad = {w: 100, h:15, x: W/2-50, y: H-40};
      ball = {x: W/2, y: H-60, r: 8, dx: 4, dy: -4};
      bricks = []; 
      for(let r=0; r<5; r++) for(let c=0; c<10; c++) bricks.push({x: c*(W/10)+2, y: 50+r*25, w: W/10-4, h: 20, status: 1});
      document.getElementById('s').innerText = sc; document.getElementById('st').innerText = 'PLAYING';
      requestAnimationFrame(loop);
    }
    let left = false, right = false;
    window.addEventListener('keydown', e => { if(e.key=='ArrowLeft') left=true; if(e.key=='ArrowRight') right=true; if(e.key==' ' && !run) st(); });
    window.addEventListener('keyup', e => { if(e.key=='ArrowLeft') left=false; if(e.key=='ArrowRight') right=false; });
    cvs.addEventListener('mousemove', e => { if(run) pad.x = e.clientX - pad.w/2; });
    function go() { run=false; document.getElementById('over').style.display='flex'; document.getElementById('fs').innerText=sc; document.getElementById('st').innerText='OVER'; }
    function loop() {
      if(!run) return; requestAnimationFrame(loop);
      if(left) pad.x-=7; if(right) pad.x+=7;
      if(pad.x<0) pad.x=0; else if(pad.x+pad.w>W) pad.x=W-pad.w;
      ball.x += ball.dx; ball.y += ball.dy;
      if(ball.x-ball.r < 0 || ball.x+ball.r > W) ball.dx = -ball.dx;
      if(ball.y-ball.r < 0) ball.dy = -ball.dy;
      else if(ball.y+ball.r > pad.y && ball.x > pad.x && ball.x < pad.x+pad.w) ball.dy = -ball.dy;
      else if(ball.y+ball.r > H) return go();
      bricks.forEach(b => {
        if(b.status && ball.x>b.x && ball.x<b.x+b.w && ball.y>b.y && ball.y<b.y+b.h) {
          ball.dy = -ball.dy; b.status = 0; sc+=10; document.getElementById('s').innerText=sc;
          if(bricks.every(br=>!br.status)) go();
        }
      });
      ctx.fillStyle = '#050510'; ctx.fillRect(0,0,W,H);
      ctx.fillStyle = '#0ff'; ctx.fillRect(pad.x, pad.y, pad.w, pad.h);
      ctx.beginPath(); ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI*2); ctx.fill(); ctx.closePath();
      bricks.forEach(b => { if(b.status) { ctx.fillStyle='#f0f'; ctx.fillRect(b.x, b.y, b.w, b.h); } });
    }
  </script>
</body>
</html>
