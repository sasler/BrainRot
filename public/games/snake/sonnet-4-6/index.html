<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Snake · BrainRot Games</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#050510;overflow:hidden;font-family:'Courier New',Courier,monospace}
#c{display:block;position:fixed;top:0;left:0}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
(function(){
'use strict';

// ─────────────────────────────────────────────────
// SETUP
// ─────────────────────────────────────────────────
const C  = document.getElementById('c');
const G  = C.getContext('2d');
const COLS = 24, ROWS = 24;
const BG   = '#050510';
const C_HEAD  = '#00ff88';
const C_TAIL  = '#003d1a';
const C_FOOD  = '#ff3366';
const C_GOLD  = '#ffcc00';
const C_GRID  = 'rgba(0,255,136,0.04)';
const TICK_START = 180, TICK_MIN = 65, TICK_DECAY = 0.966;

let W, H, CS, OX, OY;

function resize() {
  W = C.width  = window.innerWidth;
  H = C.height = window.innerHeight;
  const pad = Math.min(W,H) * 0.09;
  CS = Math.max(14, Math.floor(Math.min((W-pad*2)/COLS, (H-pad*2)/ROWS)));
  OX = ((W - CS*COLS) / 2) | 0;
  OY = ((H - CS*ROWS) / 2) | 0;
}
window.addEventListener('resize', resize, {passive:true});
resize();

// ─────────────────────────────────────────────────
// MATH
// ─────────────────────────────────────────────────
const lerp      = (a,b,t) => a+(b-a)*t;
const clamp     = (v,lo,hi) => v<lo?lo:v>hi?hi:v;
const easeOut3  = t => 1-(1-t)**3;
const easeIO2   = t => t<.5?2*t*t:1-(-2*t+2)**2/2;
const easeOut5  = t => 1-(1-t)**5;

function hexRGB(h){ return [parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)]; }
function mixHex(h1,h2,t){
  const [r1,g1,b1]=hexRGB(h1),[r2,g2,b2]=hexRGB(h2);
  return `rgb(${(r1+(r2-r1)*t)|0},${(g1+(g2-g1)*t)|0},${(b1+(b2-b1)*t)|0})`;
}

// ─────────────────────────────────────────────────
// AUDIO (Web Audio API, no external files)
// ─────────────────────────────────────────────────
let AC = null;
function getAC(){
  if(!AC) AC = new (window.AudioContext||window.webkitAudioContext)();
  if(AC.state==='suspended') AC.resume();
  return AC;
}
function tone(freq,freq2,dur,type='sine',vol=0.12){
  try{
    const a=getAC(), t=a.currentTime;
    const o=a.createOscillator(), g=a.createGain();
    o.type=type;
    o.frequency.setValueAtTime(freq,t);
    if(freq2) o.frequency.exponentialRampToValueAtTime(freq2,t+dur);
    g.gain.setValueAtTime(vol,t);
    g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
    o.connect(g); g.connect(a.destination);
    o.start(t); o.stop(t+dur+0.01);
  }catch(_){}
}
const SFX = {
  eat:   ()=> tone(440,880,0.1,'sine',0.1),
  gold:  ()=>{ tone(880,1760,0.12,'sine',0.12); tone(660,1320,0.15,'triangle',0.07); },
  die:   ()=>{ tone(220,60,0.5,'sawtooth',0.18); tone(330,80,0.38,'square',0.07); },
  start: ()=>{ tone(440,880,0.08,'sine',0.1); setTimeout(()=>tone(660,1320,0.1,'sine',0.08),80); },
};

// ─────────────────────────────────────────────────
// PARTICLE SYSTEM
// ─────────────────────────────────────────────────
const PS = [];

function burst(gx,gy,col,n=14,spd=1){
  const cx=OX+(gx+.5)*CS, cy=OY+(gy+.5)*CS;
  for(let i=0;i<n;i++){
    const a=(Math.PI*2*i/n)+Math.random()*.5;
    const s=(2.5+Math.random()*4)*spd*(CS/20);
    PS.push({x:cx,y:cy,vx:Math.cos(a)*s,vy:Math.sin(a)*s,
      life:1,decay:.02+Math.random()*.02,r:(2+Math.random()*3)*(CS/20),col});
  }
}
function ringPulse(gx,gy,col){
  PS.push({ring:true,col,x:OX+(gx+.5)*CS,y:OY+(gy+.5)*CS,
    life:1,decay:.038,rad:3,maxRad:CS*1.7});
}
function glowFlare(gx,gy,col){
  PS.push({flare:true,col,x:OX+(gx+.5)*CS,y:OY+(gy+.5)*CS,
    life:1,decay:.05,size:CS*.9});
}

function tickPS(){
  for(let i=PS.length-1;i>=0;i--){
    const p=PS[i];
    p.life-=p.decay;
    if(p.ring)  p.rad+=(p.maxRad-p.rad)*.14;
    else if(!p.flare){ p.x+=p.vx; p.y+=p.vy; p.vx*=.9; p.vy*=.9; }
    if(p.life<=0) PS.splice(i,1);
  }
}
function drawPS(){
  G.save();
  for(const p of PS){
    const a=p.life*p.life;
    G.globalAlpha=a;
    G.shadowBlur=10; G.shadowColor=p.col;
    if(p.ring){
      G.strokeStyle=p.col; G.lineWidth=1.5;
      G.beginPath(); G.arc(p.x,p.y,p.rad,0,Math.PI*2); G.stroke();
    } else if(p.flare){
      const g=G.createRadialGradient(p.x,p.y,0,p.x,p.y,p.size*p.life);
      g.addColorStop(0,p.col+'cc'); g.addColorStop(1,p.col+'00');
      G.fillStyle=g;
      G.beginPath(); G.arc(p.x,p.y,p.size*p.life,0,Math.PI*2); G.fill();
    } else {
      G.fillStyle=p.col;
      G.beginPath(); G.arc(p.x,p.y,p.r*p.life+.5,0,Math.PI*2); G.fill();
    }
  }
  G.restore();
}

// ─────────────────────────────────────────────────
// SCREEN SHAKE
// ─────────────────────────────────────────────────
let shk=0;
function addShake(v){ shk=Math.max(shk,v); }
function applyShake(){
  if(shk<.2){shk=0;return;}
  G.translate((Math.random()-.5)*2*shk,(Math.random()-.5)*2*shk);
  shk*=.8;
}

// ─────────────────────────────────────────────────
// FLOATING SCORE POPS
// ─────────────────────────────────────────────────
const POPS = [];
function addPop(gx,gy,txt,col){
  POPS.push({x:OX+(gx+.5)*CS,y:OY+(gy+.5)*CS,txt,col,life:1,vy:-1.6});
}
function tickPops(){
  for(let i=POPS.length-1;i>=0;i--){
    const p=POPS[i];
    p.y+=p.vy; p.vy*=.95; p.life-=.022;
    if(p.life<=0) POPS.splice(i,1);
  }
}
function drawPops(){
  G.save();
  for(const p of POPS){
    G.globalAlpha=easeOut3(p.life);
    G.fillStyle=p.col; G.shadowBlur=8; G.shadowColor=p.col;
    const fs=Math.max(12,Math.min(20,CS*.85));
    G.font=`bold ${fs}px 'Courier New',monospace`;
    G.textAlign='center'; G.textBaseline='middle';
    G.fillText(p.txt,p.x,p.y);
  }
  G.restore();
}

// ─────────────────────────────────────────────────
// GAME STATE
// ─────────────────────────────────────────────────
const ST={TITLE:0,PLAY:1,PAUSE:2,DYING:3,DEAD:4};
let state=ST.TITLE;

// Snake: array of {x,y,px,py}
let snake, dir, ndir, dq;
let food;          // {x,y,special,age}
let score, hi=0;
let combo, cTimer; // combo & decay timer
let tickMs;        // ms per grid tick
let lastTick, tProg; // tick timestamp & visual progress 0..1
let deathAt;       // timestamp when dying started
let glowT=0;       // ambient glow oscillator
let flashA=0;      // screen-flash alpha
let comboPop=0;    // combo number pop scale
let titleT=0;

// ─────────────────────────────────────────────────
// DRAW HELPERS
// ─────────────────────────────────────────────────
function rrect(x,y,w,h,r){
  G.beginPath();
  G.moveTo(x+r,y);
  G.lineTo(x+w-r,y); G.arcTo(x+w,y,x+w,y+r,r);
  G.lineTo(x+w,y+h-r); G.arcTo(x+w,y+h,x+w-r,y+h,r);
  G.lineTo(x+r,y+h); G.arcTo(x,y+h,x,y+h-r,r);
  G.lineTo(x,y+r); G.arcTo(x,y,x+r,y,r);
  G.closePath();
}

// ─────────────────────────────────────────────────
// INIT / LOGIC
// ─────────────────────────────────────────────────
function initGame(){
  const sx=COLS/2|0, sy=ROWS/2|0;
  snake=[
    {x:sx,  y:sy,  px:sx-1,py:sy},
    {x:sx-1,y:sy,  px:sx-2,py:sy},
    {x:sx-2,y:sy,  px:sx-3,py:sy},
    {x:sx-3,y:sy,  px:sx-4,py:sy},
  ];
  dir={x:1,y:0}; ndir={x:1,y:0}; dq=[];
  score=0; combo=1; cTimer=0;
  tickMs=TICK_START;
  PS.length=0; POPS.length=0;
  flashA=0; shk=0;
  spawnFood();
}

function spawnFood(){
  const occ=new Set(snake.map(s=>`${s.x},${s.y}`));
  const free=[];
  for(let y=0;y<ROWS;y++) for(let x=0;x<COLS;x++)
    if(!occ.has(`${x},${y}`)) free.push({x,y});
  if(!free.length) return;
  const p=free[Math.random()*free.length|0];
  food={x:p.x,y:p.y,special:Math.random()<.12,age:0};
}

function gameTick(){
  // consume direction queue
  while(dq.length){
    const d=dq.shift();
    if(d.x!==-dir.x||d.y!==-dir.y){ ndir=d; break; }
  }
  dir={...ndir};

  const hd=snake[0];
  const nx=hd.x+dir.x, ny=hd.y+dir.y;

  // wall collision
  if(nx<0||nx>=COLS||ny<0||ny>=ROWS){ triggerDeath(); return; }
  // self collision (all except tail which vacates)
  for(let i=0;i<snake.length-1;i++)
    if(snake[i].x===nx&&snake[i].y===ny){ triggerDeath(); return; }

  const ate=food&&nx===food.x&&ny===food.y;
  const isGold=ate&&food.special;

  // shift body backwards so each segment follows the one ahead
  for(let i=snake.length-1;i>0;i--){
    snake[i].px=snake[i].x; snake[i].py=snake[i].y;
    snake[i].x=snake[i-1].x; snake[i].y=snake[i-1].y;
  }
  snake[0].px=hd.x; snake[0].py=hd.y;
  snake[0].x=nx;    snake[0].y=ny;

  if(ate){
    // grow: clone old tail at its previous position
    const tl=snake[snake.length-1];
    snake.push({x:tl.px,y:tl.py,px:tl.px,py:tl.py});

    const pts=(isGold?5:1)*combo;
    score+=pts;
    if(score>hi) hi=score;

    // combo
    cTimer=10;
    if(combo<8) combo++;
    comboPop=1;

    // effects
    burst(nx,ny,isGold?C_GOLD:C_FOOD,isGold?22:14);
    ringPulse(nx,ny,isGold?C_GOLD:C_FOOD);
    glowFlare(nx,ny,isGold?C_GOLD:C_HEAD);
    addShake(isGold?11:5);
    flashA=isGold?.28:.12;

    addPop(nx,ny,`+${pts}${combo>1?' ×'+combo:''}`,isGold?C_GOLD:C_HEAD);
    isGold?SFX.gold():SFX.eat();

    tickMs=Math.max(TICK_MIN,tickMs*TICK_DECAY);
    spawnFood();
  } else {
    if(cTimer>0){ cTimer--; if(cTimer===0) combo=1; }
  }

  if(food) food.age++;
}

function triggerDeath(){
  state=ST.DYING;
  deathAt=performance.now();
  SFX.die();
  addShake(20);
  flashA=.55;
  for(const s of snake) burst(s.x,s.y,C_HEAD,5,.8);
}

// ─────────────────────────────────────────────────
// RENDERING
// ─────────────────────────────────────────────────
function drawGrid(){
  G.strokeStyle=C_GRID; G.lineWidth=1;
  for(let x=0;x<=COLS;x++){
    G.beginPath(); G.moveTo(OX+x*CS,OY); G.lineTo(OX+x*CS,OY+ROWS*CS); G.stroke();
  }
  for(let y=0;y<=ROWS;y++){
    G.beginPath(); G.moveTo(OX,OY+y*CS); G.lineTo(OX+COLS*CS,OY+y*CS); G.stroke();
  }
  // glowing border
  const pulse=.5+.5*Math.sin(glowT);
  G.save();
  G.strokeStyle=`rgba(0,255,136,${.12+pulse*.14})`;
  G.lineWidth=2;
  G.shadowBlur=14+pulse*10; G.shadowColor=C_HEAD;
  G.strokeRect(OX-1,OY-1,COLS*CS+2,ROWS*CS+2);
  G.restore();
}

function drawFood(){
  if(!food) return;
  const fx=OX+(food.x+.5)*CS, fy=OY+(food.y+.5)*CS;
  const pulse=.5+.5*Math.sin(glowT*3+food.age*.25);
  const r=CS*.3*(1+pulse*.14);
  const col=food.special?C_GOLD:C_FOOD;
  G.save();
  G.shadowBlur=20+pulse*16; G.shadowColor=col;
  if(food.special){
    // spinning star
    const spikes=5, rot=glowT*1.4;
    G.fillStyle=col;
    G.beginPath();
    for(let i=0;i<spikes*2;i++){
      const a=i*Math.PI/spikes+rot;
      const rad=i%2===0?r*1.1:r*.42;
      i===0?G.moveTo(fx+Math.cos(a)*rad,fy+Math.sin(a)*rad)
           :G.lineTo(fx+Math.cos(a)*rad,fy+Math.sin(a)*rad);
    }
    G.closePath(); G.fill();
    G.fillStyle='rgba(255,255,255,.55)';
    G.shadowBlur=0;
    G.beginPath(); G.arc(fx-r*.15,fy-r*.15,r*.28,0,Math.PI*2); G.fill();
  } else {
    G.fillStyle=col;
    G.beginPath(); G.arc(fx,fy,r,0,Math.PI*2); G.fill();
    // specular
    G.fillStyle='rgba(255,255,255,.5)';
    G.shadowBlur=0;
    G.beginPath(); G.arc(fx-r*.22,fy-r*.22,r*.32,0,Math.PI*2); G.fill();
  }
  G.restore();
}

function segVis(i,t){
  const s=snake[i];
  return {x:lerp(s.px,s.x,t), y:lerp(s.py,s.y,t)};
}

function drawSnake(t){
  if(!snake||!snake.length) return;
  const et=easeIO2(t);
  const len=snake.length;

  // ── connectors (draw behind segments) ──────────
  G.save();
  for(let i=0;i<len-1;i++){
    const frac=i/(len-1);
    const v0=segVis(i,et), v1=segVis(i+1,et);
    const x0=OX+v0.x*CS+CS*.5, y0=OY+v0.y*CS+CS*.5;
    const x1=OX+v1.x*CS+CS*.5, y1=OY+v1.y*CS+CS*.5;
    const dx=x1-x0, dy=y1-y0, dist=Math.sqrt(dx*dx+dy*dy);
    if(dist<.1) continue;
    const nx=-dy/dist*((CS-3)*.5), ny=dx/dist*((CS-3)*.5);
    G.globalAlpha=lerp(1,.7,frac*.9);
    G.fillStyle=mixHex(C_HEAD,C_TAIL,frac*.88);
    G.shadowBlur=0;
    G.beginPath();
    G.moveTo(x0+nx,y0+ny); G.lineTo(x0-nx,y0-ny);
    G.lineTo(x1-nx,y1-ny); G.lineTo(x1+nx,y1+ny);
    G.closePath(); G.fill();
  }
  G.restore();

  // ── segments ──────────────────────────────────
  for(let i=len-1;i>=0;i--){
    const frac=i/(len-1);
    const v=segVis(i,et);
    const sx=OX+v.x*CS, sy=OY+v.y*CS;
    const col=mixHex(C_HEAD,C_TAIL,frac*.88);
    const glow=lerp(18,2,frac);
    G.save();
    G.globalAlpha=lerp(1,.72,frac*.9);
    G.fillStyle=col;
    G.shadowBlur=glow; G.shadowColor=C_HEAD;
    const rad=Math.ceil(CS*.34);
    rrect(sx+1,sy+1,CS-2,CS-2,rad);
    G.fill();

    if(i===0){
      // head highlight
      G.shadowBlur=28; G.shadowColor=C_HEAD;
      const grad=G.createLinearGradient(sx+1,sy+1,sx+CS-1,sy+CS-1);
      grad.addColorStop(0,'rgba(255,255,255,.35)');
      grad.addColorStop(1,'rgba(0,255,136,.05)');
      G.fillStyle=grad;
      rrect(sx+1,sy+1,CS-2,CS-2,rad);
      G.fill();

      // eyes
      G.shadowBlur=0; G.globalAlpha=1; G.fillStyle=BG;
      const ecx=sx+CS*.5, ecy=sy+CS*.5;
      const eo=CS*.2, er=Math.max(1.8,CS*.08);
      let e1x,e1y,e2x,e2y;
      if(dir.x===1)       {e1x=ecx+eo;e1y=ecy-eo;e2x=ecx+eo;e2y=ecy+eo;}
      else if(dir.x===-1) {e1x=ecx-eo;e1y=ecy-eo;e2x=ecx-eo;e2y=ecy+eo;}
      else if(dir.y===-1) {e1x=ecx-eo;e1y=ecy-eo;e2x=ecx+eo;e2y=ecy-eo;}
      else                {e1x=ecx-eo;e1y=ecy+eo;e2x=ecx+eo;e2y=ecy+eo;}
      G.beginPath(); G.arc(e1x,e1y,er,0,Math.PI*2); G.fill();
      G.beginPath(); G.arc(e2x,e2y,er,0,Math.PI*2); G.fill();
    }
    G.restore();
  }
}

// ─────────────────────────────────────────────────
// HUD
// ─────────────────────────────────────────────────
function drawHUD(){
  const pulse=.5+.5*Math.sin(glowT);
  const sSize=Math.max(16,Math.min(28,CS*1.1));
  const hiSize=Math.max(11,Math.min(17,CS*.7));
  G.save();

  // score label
  G.fillStyle=C_HEAD; G.shadowBlur=10; G.shadowColor=C_HEAD;
  G.font=`bold ${sSize}px 'Courier New',monospace`;
  G.textAlign='left'; G.textBaseline='bottom';
  G.fillText(`SCORE: ${score}`,OX,OY-10);

  // best
  G.shadowBlur=0; G.fillStyle='rgba(0,255,136,.5)';
  G.font=`${hiSize}px 'Courier New',monospace`;
  G.textAlign='right';
  G.fillText(`BEST: ${hi}`,OX+COLS*CS,OY-10);

  // combo badge
  if(combo>1){
    const cp=easeOut5(comboPop);
    const cs2=Math.max(16,Math.min(28,CS*1.1))*(1+cp*.35);
    G.font=`bold ${cs2}px 'Courier New',monospace`;
    G.textAlign='left'; G.textBaseline='top';
    G.fillStyle=C_GOLD; G.shadowBlur=16; G.shadowColor=C_GOLD;
    G.globalAlpha=clamp(.4+cTimer*.07,0,1);
    G.fillText(`×${combo}`,OX,OY+ROWS*CS+8);
  }

  // speed bar
  const spd=1-(tickMs-TICK_MIN)/(TICK_START-TICK_MIN);
  const barW=Math.min(120,COLS*CS*.4), barH=5;
  const bx=OX+COLS*CS-barW, by=OY+ROWS*CS+10;
  G.globalAlpha=1; G.shadowBlur=0;
  G.fillStyle='rgba(0,255,136,.15)';
  G.fillRect(bx,by,barW,barH);
  const speedCol=spd>.7?C_GOLD:C_HEAD;
  G.fillStyle=speedCol; G.shadowBlur=4; G.shadowColor=speedCol;
  G.fillRect(bx,by,barW*spd,barH);
  G.fillStyle='rgba(0,255,136,.45)'; G.shadowBlur=0;
  G.font=`${Math.max(9,Math.min(13,CS*.55))}px 'Courier New',monospace`;
  G.textAlign='right'; G.textBaseline='top';
  G.fillText(`SPD ${Math.round(spd*100)}%`,OX+COLS*CS,OY+ROWS*CS+18);

  G.restore();
}

// ─────────────────────────────────────────────────
// TITLE SCREEN
// ─────────────────────────────────────────────────
function drawTitle(ts){
  const cx=W*.5, cy=H*.5;
  G.save();

  // orbiting dots background
  for(let i=0;i<48;i++){
    const a=i/48*Math.PI*2+ts*.00028;
    const rr=Math.min(W,H)*.33+Math.sin(ts*.001+i)*18;
    const al=.06+.06*Math.sin(ts*.0018+i);
    G.fillStyle=`rgba(0,255,136,${al})`;
    G.shadowBlur=0;
    G.beginPath(); G.arc(cx+Math.cos(a)*rr,cy+Math.sin(a)*rr,1.8,0,Math.PI*2); G.fill();
  }

  // title text layers
  const tSize=Math.max(38,Math.min(86,W*.085));
  G.textAlign='center'; G.textBaseline='middle';
  for(let g=3;g>=0;g--){
    G.shadowBlur=20+g*18; G.shadowColor=C_HEAD;
    G.fillStyle=g===0?C_HEAD:`rgba(0,255,136,${.25-g*.04})`;
    G.font=`bold ${tSize}px 'Courier New',monospace`;
    G.fillText('SNAKE',cx,cy-tSize*.9);
  }

  // subtitle
  G.shadowBlur=6; G.shadowColor='rgba(0,255,136,.5)';
  G.fillStyle='rgba(0,255,136,.55)';
  G.font=`${Math.max(10,tSize*.21)}px 'Courier New',monospace`;
  G.fillText('B R A I N R O T  ·  G A M E S',cx,cy-tSize*.32);

  // divider line
  const dw=Math.min(420,W*.6);
  const lp=.65+.35*Math.sin(ts*.003);
  G.strokeStyle=`rgba(0,255,136,${lp*.55})`; G.lineWidth=1;
  G.shadowBlur=7; G.shadowColor=C_HEAD;
  G.beginPath(); G.moveTo(cx-dw*.5,cy-tSize*.04); G.lineTo(cx+dw*.5,cy-tSize*.04); G.stroke();

  // instructions table
  const iSz=Math.max(12,Math.min(16,W*.016));
  G.font=`${iSz}px 'Courier New',monospace`;
  G.shadowBlur=0;
  const rows=[
    ['ARROWS / WASD','Move'],
    ['EAT ■ RED FOOD','+1 pt  (combo chains!)'],
    ['EAT ★ GOLD','+5 pts  (rare spawn)'],
    ['AVOID','Walls & yourself'],
    ['P / ESC','Pause'],
  ];
  const lineH=iSz*1.85, startY=cy+tSize*.08;
  for(let i=0;i<rows.length;i++){
    const y=startY+i*lineH;
    G.textAlign='right'; G.fillStyle='rgba(0,255,136,.9)';
    G.fillText(rows[i][0],cx-10,y);
    G.textAlign='left';  G.fillStyle='rgba(0,255,136,.4)';
    G.fillText(rows[i][1],cx+10,y);
  }

  // blinking start prompt
  const blink=.5+.5*Math.sin(ts*.0042);
  G.globalAlpha=.5+blink*.5;
  G.textAlign='center';
  G.fillStyle=C_HEAD; G.shadowBlur=14; G.shadowColor=C_HEAD;
  G.font=`bold ${Math.max(13,iSz*1.1)}px 'Courier New',monospace`;
  G.fillText('[ SPACE  OR  ENTER  TO  START ]',cx,startY+rows.length*lineH+lineH*.85);
  G.restore();
}

// ─────────────────────────────────────────────────
// GAME OVER SCREEN
// ─────────────────────────────────────────────────
function drawGameOver(ts){
  const elapsed=ts-deathAt;
  const t=clamp(elapsed/1300,0,1);
  const cx=W*.5, cy=H*.5;
  G.save();

  // darkening overlay
  G.fillStyle=`rgba(5,5,16,${easeOut3(t)*.88})`;
  G.fillRect(0,0,W,H);

  const goSz=Math.max(42,Math.min(94,W*.092));

  // GAME OVER text
  G.globalAlpha=easeOut3(Math.min(1,t*2.5));
  G.textAlign='center'; G.textBaseline='middle';
  G.shadowBlur=32; G.shadowColor=C_FOOD;
  G.fillStyle=C_FOOD;
  G.font=`bold ${goSz}px 'Courier New',monospace`;
  G.fillText('GAME OVER',cx,cy-goSz*.82);

  if(t>.28){
    const st=easeOut3((t-.28)/.72);
    G.globalAlpha=st;

    // score
    G.shadowBlur=16; G.shadowColor=C_HEAD; G.fillStyle=C_HEAD;
    G.font=`bold ${goSz*.52|0}px 'Courier New',monospace`;
    G.fillText(`SCORE: ${score}`,cx,cy);

    // best
    const isNewBest=score>0&&score>=hi;
    G.fillStyle=isNewBest?C_GOLD:'rgba(0,255,136,.55)';
    G.shadowColor=isNewBest?C_GOLD:'transparent';
    G.shadowBlur=isNewBest?20:0;
    G.font=`${goSz*.32|0}px 'Courier New',monospace`;
    G.fillText(isNewBest?`★  NEW BEST: ${score}  ★`:`BEST: ${hi}`,cx,cy+goSz*.42);

    // stats
    G.shadowBlur=0; G.fillStyle='rgba(0,255,136,.38)';
    G.font=`${goSz*.26|0}px 'Courier New',monospace`;
    G.fillText(`LENGTH: ${snake.length}    COMBO: ×${combo}`,cx,cy+goSz*.78);
  }

  if(t>.62){
    const st=easeOut3((t-.62)/.38);
    const blink=.55+.45*Math.sin(ts*.0042);
    G.globalAlpha=st*blink;
    G.shadowBlur=12; G.shadowColor=C_HEAD; G.fillStyle=C_HEAD;
    G.font=`bold ${goSz*.28|0}px 'Courier New',monospace`;
    G.fillText('[ SPACE  /  R  TO  PLAY  AGAIN ]',cx,cy+goSz*1.3);
  }
  G.restore();
}

// ─────────────────────────────────────────────────
// PAUSE SCREEN
// ─────────────────────────────────────────────────
function drawPause(){
  const cx=W*.5, cy=H*.5;
  G.save();
  G.fillStyle='rgba(5,5,16,.75)';
  G.fillRect(0,0,W,H);
  const ps=Math.max(32,Math.min(72,W*.072));
  G.textAlign='center'; G.textBaseline='middle';
  G.shadowBlur=22; G.shadowColor=C_GOLD; G.fillStyle=C_GOLD;
  G.font=`bold ${ps}px 'Courier New',monospace`;
  G.fillText('PAUSED',cx,cy);
  G.shadowBlur=0; G.fillStyle='rgba(0,255,136,.45)';
  G.font=`${ps*.32|0}px 'Courier New',monospace`;
  G.fillText('P  /  ESC  to resume',cx,cy+ps*.7);
  G.restore();
}

// ─────────────────────────────────────────────────
// VIGNETTE
// ─────────────────────────────────────────────────
function drawVignette(){
  const r=G.createRadialGradient(W*.5,H*.5,Math.min(W,H)*.3,W*.5,H*.5,Math.min(W,H)*.72);
  r.addColorStop(0,'rgba(5,5,16,0)');
  r.addColorStop(1,'rgba(5,5,16,.55)');
  G.save(); G.fillStyle=r; G.fillRect(0,0,W,H); G.restore();
}

// ─────────────────────────────────────────────────
// MAIN LOOP
// ─────────────────────────────────────────────────
let lastFrame=0;
function frame(ts){
  requestAnimationFrame(frame);
  lastFrame=ts;
  glowT+=.016;
  if(comboPop>0) comboPop=Math.max(0,comboPop-.04);

  // clear
  G.setTransform(1,0,0,1,0,0);
  G.fillStyle=BG; G.fillRect(0,0,W,H);
  applyShake();

  // title
  if(state===ST.TITLE){
    drawGrid();
    drawTitle(ts);
    drawVignette();
    return;
  }

  // tick
  if(state===ST.PLAY){
    const elapsed=ts-lastTick;
    if(elapsed>=tickMs){
      lastTick=ts;
      gameTick();
    }
    tProg=clamp((ts-lastTick)/tickMs,0,1);
  }

  // death progress
  let deathFrac=0;
  if(state===ST.DYING){
    deathFrac=clamp((ts-deathAt)/1300,0,1);
    if(deathFrac>=1) state=ST.DEAD;
  }

  // render
  drawGrid();
  drawFood();

  // snake (fade out during death)
  if(state===ST.DYING||state===ST.DEAD){
    const snkA=clamp(1-deathFrac*2.5,0,1);
    if(snkA>0){
      G.save(); G.globalAlpha=snkA; drawSnake(tProg); G.restore();
    }
  } else {
    drawSnake(tProg);
  }

  tickPS(); drawPS();
  tickPops(); drawPops();

  // HUD
  if(state===ST.PLAY||state===ST.PAUSE||state===ST.DYING||state===ST.DEAD) drawHUD();

  // screen flash
  if(flashA>.004){
    G.save(); G.globalAlpha=flashA; G.fillStyle=C_HEAD; G.fillRect(0,0,W,H); G.restore();
    flashA*=.82;
  }

  drawVignette();

  // overlays
  if(state===ST.PAUSE) drawPause();
  if(state===ST.DEAD||state===ST.DYING) drawGameOver(ts);
}

// ─────────────────────────────────────────────────
// INPUT
// ─────────────────────────────────────────────────
function startGame(){
  initGame();
  state=ST.PLAY;
  lastTick=performance.now();
  tProg=0;
  SFX.start();
}

document.addEventListener('keydown', e=>{
  const k=e.key;

  if(state===ST.TITLE||state===ST.DEAD){
    const starters=[' ','Enter','ArrowUp','ArrowDown','ArrowLeft','ArrowRight','w','a','s','d','W','A','S','D'];
    if(starters.includes(k)){ startGame(); e.preventDefault(); return; }
  }

  if(state===ST.DEAD&&(k==='r'||k==='R')){ startGame(); return; }

  if((state===ST.PLAY||state===ST.PAUSE)&&(k==='p'||k==='P'||k==='Escape')){
    if(state===ST.PLAY){
      state=ST.PAUSE;
    } else {
      state=ST.PLAY;
      lastTick=performance.now(); // reset timer to avoid instant tick
    }
    return;
  }

  if(state!==ST.PLAY) return;

  let nd=null;
  if(k==='ArrowUp'   ||k==='w'||k==='W') nd={x:0,y:-1};
  if(k==='ArrowDown' ||k==='s'||k==='S') nd={x:0,y:1};
  if(k==='ArrowLeft' ||k==='a'||k==='A') nd={x:-1,y:0};
  if(k==='ArrowRight'||k==='d'||k==='D') nd={x:1,y:0};

  if(nd){
    e.preventDefault();
    const last=dq.length?dq[dq.length-1]:dir;
    if((nd.x!==0||nd.y!==0)&&!(nd.x===-last.x&&nd.y===-last.y))
      if(dq.length<2) dq.push(nd);
  }
});

// touch swipe support
let tStart=null;
document.addEventListener('touchstart', e=>{
  tStart={x:e.touches[0].clientX,y:e.touches[0].clientY};
  if(state===ST.TITLE||state===ST.DEAD) setTimeout(startGame,80);
  e.preventDefault();
},{passive:false});

document.addEventListener('touchend', e=>{
  if(!tStart||state!==ST.PLAY) return;
  const dx=e.changedTouches[0].clientX-tStart.x;
  const dy=e.changedTouches[0].clientY-tStart.y;
  const ax=Math.abs(dx),ay=Math.abs(dy);
  if(ax<12&&ay<12){ tStart=null; return; }
  const nd=ax>ay?(dx>0?{x:1,y:0}:{x:-1,y:0}):(dy>0?{x:0,y:1}:{x:0,y:-1});
  const last=dq.length?dq[dq.length-1]:dir;
  if(!(nd.x===-last.x&&nd.y===-last.y)) if(dq.length<2) dq.push(nd);
  tStart=null;
  e.preventDefault();
},{passive:false});

// ─────────────────────────────────────────────────
// LAUNCH
// ─────────────────────────────────────────────────
requestAnimationFrame(frame);

})();
</script>
