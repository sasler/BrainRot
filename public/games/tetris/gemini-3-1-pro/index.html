<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tetris</title>
    <style>
        body {
            background-color: #1a1a2e;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        #game-container {
            display: flex;
            gap: 20px;
        }
        canvas {
            background-color: #0f0f1a;
            border: 2px solid #4a4e69;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.2);
        }
        #ui-panel {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 150px;
        }
        .panel-box {
            background-color: #16213e;
            border: 2px solid #4a4e69;
            padding: 15px;
            text-align: center;
            border-radius: 8px;
        }
        .panel-box h3 {
            margin: 0 0 10px 0;
            color: #00ffff;
            font-size: 16px;
            text-transform: uppercase;
        }
        .panel-box span {
            font-size: 24px;
            font-weight: bold;
            color: #fff;
        }
        button {
            background-color: #e94560;
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 6px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.2s;
            margin-top: 20px;
        }
        button:hover {
            background-color: #ff5e7e;
            transform: scale(1.05);
        }
        .hidden {
            display: none !important;
        }
        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(26, 26, 46, 0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }
        .title {
            font-size: 48px;
            color: #00ffff;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
            margin-bottom: 30px;
            letter-spacing: 4px;
        }
    </style>
</head>
<body>
    <div id="overlay">
        <h1 class="title">TETRIS</h1>
        <h2 id="final-score" class="hidden">Score: <span>0</span></h2>
        <button id="start-btn">Start Game</button>
    </div>

    <div id="game-container">
        <canvas id="tetris-board" width="300" height="600"></canvas>
        <div id="ui-panel">
            <div class="panel-box">
                <h3>Score</h3>
                <span id="score">0</span>
            </div>
            <div class="panel-box">
                <h3>Level</h3>
                <span id="level">1</span>
            </div>
            <div class="panel-box">
                <h3>Lines</h3>
                <span id="lines">0</span>
            </div>
            <div class="panel-box" style="height: 100px;">
                <h3>Next</h3>
                <canvas id="next-piece" width="100" height="60" style="background:transparent; border:none; box-shadow:none;"></canvas>
            </div>
            <button id="pause-btn">Pause</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('tetris-board');
        const ctx = canvas.getContext('2d');
        const nextCanvas = document.getElementById('next-piece');
        const nextCtx = nextCanvas.getContext('2d');
        
        const BLOCK_SIZE = 30;
        const COLS = 10;
        const ROWS = 20;
        
        const COLORS = [
            null,
            '#00FFFF', // I - Cyan
            '#0000FF', // J - Blue
            '#FFA500', // L - Orange
            '#FFFF00', // O - Yellow
            '#00FF00', // S - Green
            '#800080', // T - Purple
            '#FF0000'  // Z - Red
        ];
        
        const SHAPES = [
            [],
            [[0,0], [1,0], [-1,0], [2,0]], // I
            [[0,0], [-1,0], [0,-1], [-1,-1]], // O
            [[0,0], [1,0], [0,-1], [-1,0]], // T
            [[0,0], [-1,0], [1,0], [1,-1]], // L
            [[0,0], [1,0], [-1,0], [-1,-1]], // J
            [[0,0], [1,0], [0,-1], [-1,-1]], // Z
            [[0,0], [-1,0], [0,-1], [1,-1]]  // S
        ];

        let board = Array.from({length: ROWS}, () => Array(COLS).fill(0));
        let score = 0, level = 1, lines = 0;
        let isPlaying = false, isPaused = false;
        let currentPiece = null, nextPieceType = 0;
        let dropCounter = 0, dropInterval = 1000;
        let lastTime = 0;
        let animationId;

        class Piece {
            constructor(type) {
                this.type = type;
                this.shape = JSON.parse(JSON.stringify(SHAPES[type]));
                this.x = 4;
                this.y = 1;
            }

            draw(context, offsetX = 0, offsetY = 0, size = BLOCK_SIZE) {
                context.fillStyle = COLORS[this.type];
                context.strokeStyle = 'rgba(0,0,0,0.5)';
                this.shape.forEach(p => {
                    let px = (this.x + p[0]) * size + offsetX;
                    let py = (this.y + p[1]) * size + offsetY;
                    context.fillRect(px, py, size - 1, size - 1);
                    context.strokeRect(px, py, size - 1, size - 1);
                });
            }

            rotate() {
                if (this.type === 2) return; // Don't rotate O piece
                const rotDir = 1;
                const prev = JSON.parse(JSON.stringify(this.shape));
                this.shape.forEach(p => {
                    const x = p[0];
                    p[0] = -p[1] * rotDir;
                    p[1] = x * rotDir;
                });
                
                if (this.checkCollision()) {
                    this.shape = prev; // Revert if collision
                }
            }

            move(dx, dy) {
                this.x += dx;
                this.y += dy;
                if (this.checkCollision()) {
                    this.x -= dx;
                    this.y -= dy;
                    return false;
                }
                return true;
            }

            checkCollision() {
                for (let i = 0; i < this.shape.length; i++) {
                    const p = this.shape[i];
                    const nx = this.x + p[0];
                    const ny = this.y + p[1];
                    if (nx < 0 || nx >= COLS || ny >= ROWS || (ny >= 0 && board[ny][nx])) {
                        return true;
                    }
                }
                return false;
            }

            lock() {
                this.shape.forEach(p => {
                    const nx = this.x + p[0];
                    const ny = this.y + p[1];
                    if (ny >= 0) {
                        board[ny][nx] = this.type;
                    }
                });
            }
        }

        function initGame() {
            board = Array.from({length: ROWS}, () => Array(COLS).fill(0));
            score = 0; level = 1; lines = 0;
            updateUI();
            nextPieceType = Math.floor(Math.random() * 7) + 1;
            spawnPiece();
            isPlaying = true;
            isPaused = false;
            dropInterval = 1000;
            document.getElementById('overlay').classList.add('hidden');
            document.getElementById('pause-btn').innerText = 'Pause';
            lastTime = performance.now();
            if(animationId) cancelAnimationFrame(animationId);
            update();
        }

        function spawnPiece() {
            currentPiece = new Piece(nextPieceType);
            nextPieceType = Math.floor(Math.random() * 7) + 1;
            drawNextPiece();
            if (currentPiece.checkCollision()) {
                gameOver();
            }
        }

        function clearLines() {
            let linesCleared = 0;
            outer: for (let y = ROWS - 1; y >= 0; y--) {
                for (let x = 0; x < COLS; x++) {
                    if (board[y][x] === 0) continue outer;
                }
                const row = board.splice(y, 1)[0].fill(0);
                board.unshift(row);
                y++;
                linesCleared++;
            }
            if (linesCleared > 0) {
                lines += linesCleared;
                const lineScores = [0, 40, 100, 300, 1200];
                score += lineScores[linesCleared] * level;
                level = Math.floor(lines / 10) + 1;
                dropInterval = Math.max(100, 1000 - (level - 1) * 100);
                updateUI();
            }
        }

        function gameOver() {
            isPlaying = false;
            cancelAnimationFrame(animationId);
            const overlay = document.getElementById('overlay');
            const fs = document.getElementById('final-score');
            const btn = document.getElementById('start-btn');
            overlay.classList.remove('hidden');
            fs.classList.remove('hidden');
            fs.querySelector('span').innerText = score;
            btn.innerText = 'Play Again';
            document.querySelector('.title').innerText = 'GAME OVER';
        }

        function drawBoard() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Draw grid
            ctx.strokeStyle = '#222';
            for(let i=0; i<=COLS; i++) {
                ctx.beginPath(); ctx.moveTo(i*BLOCK_SIZE, 0); ctx.lineTo(i*BLOCK_SIZE, canvas.height); ctx.stroke();
            }
            for(let i=0; i<=ROWS; i++) {
                ctx.beginPath(); ctx.moveTo(0, i*BLOCK_SIZE); ctx.lineTo(canvas.width, i*BLOCK_SIZE); ctx.stroke();
            }

            // Draw placed blocks
            for (let y = 0; y < ROWS; y++) {
                for (let x = 0; x < COLS; x++) {
                    if (board[y][x]) {
                        ctx.fillStyle = COLORS[board[y][x]];
                        ctx.fillRect(x * BLOCK_SIZE, y * BLOCK_SIZE, BLOCK_SIZE - 1, BLOCK_SIZE - 1);
                        ctx.strokeStyle = 'rgba(0,0,0,0.5)';
                        ctx.strokeRect(x * BLOCK_SIZE, y * BLOCK_SIZE, BLOCK_SIZE - 1, BLOCK_SIZE - 1);
                    }
                }
            }
            
            if (currentPiece) currentPiece.draw(ctx);
        }

        function drawNextPiece() {
            nextCtx.clearRect(0, 0, nextCanvas.width, nextCanvas.height);
            let dummy = new Piece(nextPieceType);
            dummy.x = 0; dummy.y = 0;
            // Center the piece in the small canvas
            let offX = 50; let offY = 30;
            if(nextPieceType === 1) offX -= 10;
            dummy.draw(nextCtx, offX, offY, 20);
        }

        function updateUI() {
            document.getElementById('score').innerText = score;
            document.getElementById('level').innerText = level;
            document.getElementById('lines').innerText = lines;
        }

        function update(time = 0) {
            if (!isPlaying || isPaused) return;
            
            const deltaTime = time - lastTime;
            lastTime = time;
            dropCounter += deltaTime;

            if (dropCounter > dropInterval) {
                if (!currentPiece.move(0, 1)) {
                    currentPiece.lock();
                    clearLines();
                    spawnPiece();
                }
                dropCounter = 0;
            }

            drawBoard();
            animationId = requestAnimationFrame(update);
        }

        document.addEventListener('keydown', event => {
            if (!isPlaying || isPaused) return;
            
            switch(event.keyCode) {
                case 37: // Left
                    currentPiece.move(-1, 0); break;
                case 39: // Right
                    currentPiece.move(1, 0); break;
                case 40: // Down
                    if(currentPiece.move(0, 1)) dropCounter = 0; 
                    break;
                case 38: // Up
                    currentPiece.rotate(); break;
                case 32: // Space (Hard drop)
                    while (currentPiece.move(0, 1)) {}
                    currentPiece.lock();
                    clearLines();
                    spawnPiece();
                    dropCounter = 0;
                    break;
            }
            if(isPlaying && !isPaused) drawBoard(); // Immediate visual feedback
        });

        document.getElementById('start-btn').addEventListener('click', initGame);
        document.getElementById('pause-btn').addEventListener('click', () => {
            if (!isPlaying) return;
            isPaused = !isPaused;
            document.getElementById('pause-btn').innerText = isPaused ? 'Resume' : 'Pause';
            if (!isPaused) {
                lastTime = performance.now();
                update();
            }
        });

        drawBoard(); // Initial blank draw
    </script>
</body>
</html>
